    <!-- P shape with blue accent -->
    <path d="M 10 50 L 10 8 L 25 8 Q 30 8 30 15 L 30 20 Q 30 27 25 27 L 10 27"
          stroke="#185FA5" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- D shape -->
    <path d="M 40 50 L 40 8 L 52 8 Q 58 8 58 18 L 58 40 Q 58 50 52 50 L 40 50"
